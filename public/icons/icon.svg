<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#09090b"/>

  <!-- AI symbol: stylized decision tree/logic gate -->
  <g fill="#ffffff">
    <!-- Top node -->
    <circle cx="256" cy="120" r="20"/>

    <!-- Decision branches -->
    <line x1="256" y1="140" x2="256" y2="200" stroke="#ffffff" stroke-width="8"/>

    <!-- Left branch -->
    <line x1="256" y1="200" x2="180" y2="280" stroke="#ffffff" stroke-width="8"/>
    <circle cx="180" cy="280" r="16"/>
    <line x1="180" y1="296" x2="180" y2="356" stroke="#ffffff" stroke-width="6"/>
    <circle cx="180" cy="372" r="14"/>

    <!-- Right branch -->
    <line x1="256" y1="200" x2="332" y2="280" stroke="#ffffff" stroke-width="8"/>
    <circle cx="332" cy="280" r="16"/>
    <line x1="332" y1="296" x2="332" y2="356" stroke="#ffffff" stroke-width="6"/>
    <circle cx="332" cy="372" r="14"/>

    <!-- AI text -->
    <text x="256" y="440" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>
  </g>
</svg>
